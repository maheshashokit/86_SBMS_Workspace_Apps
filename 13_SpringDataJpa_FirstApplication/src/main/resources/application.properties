spring.application.name=13_SpringDataJpa_FirstApplication

#MySQL Database Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/86_springbootms_db
spring.datasource.username=root
spring.datasource.password=root

#Viewing SQL Queries at console
spring.jpa.show-sql=true
#Viewing SQL Queries in formatted way
spring.jpa.properties.hibernate.format_sql=true
#creating database table automatically through spring data jpa
spring.jpa.hibernate.ddl-auto=update